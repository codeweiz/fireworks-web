<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟花特效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            cursor: pointer;
            font-family: 'Segoe UI', sans-serif;
        }
        
        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            animation: fadeInUp 1s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="hint">点击屏幕释放烟花</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let fireworks = [];
        let particles = [];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        // 随机数辅助函数
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }
        
        function randomInt(min, max) {
            return Math.floor(random(min, max + 1));
        }
        
        // 颜色数组
        const colors = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', 
            '#FFEAA7', '#DDA0DD', '#FF8C00', '#00CED1',
            '#FF69B4', '#7B68EE', '#32CD32', '#FFD700'
        ];
        
        // 烟花类
        class Firework {
            constructor(sx, sy, tx, ty) {
                this.x = sx;
                this.y = sy;
                this.sx = sx;
                this.sy = sy;
                this.tx = tx;
                this.ty = ty;
                this.distanceToTarget = Math.sqrt(Math.pow(tx - sx, 2) + Math.pow(ty - sy, 2));
                this.distanceTraveled = 0;
                this.coordinates = [];
                this.coordinateCount = 3;
                
                while (this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                
                this.angle = Math.atan2(ty - sy, tx - sx);
                this.speed = 2;
                this.acceleration = 1.05;
                this.brightness = randomInt(50, 70);
                this.targetRadius = 1;
            }
            
            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                
                this.speed *= this.acceleration;
                
                const vx = Math.cos(this.angle) * this.speed;
                const vy = Math.sin(this.angle) * this.speed;
                
                this.distanceTraveled = Math.sqrt(Math.pow(this.sx - this.x, 2) + Math.pow(this.sy - this.y, 2));
                
                if (this.distanceTraveled >= this.distanceToTarget) {
                    createParticles(this.tx, this.ty);
                    fireworks.splice(index, 1);
                } else {
                    this.x += vx;
                    this.y += vy;
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `hsl(${randomInt(0, 360)}, 100%, ${this.brightness}%)`;
                ctx.stroke();
                
                // 绘制目标点
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }
        }
        
        // 粒子类
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.coordinates = [];
                this.coordinateCount = 5;
                
                while (this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                
                this.angle = random(0, Math.PI * 2);
                this.speed = random(1, 10);
                this.friction = 0.95;
                this.gravity = 1;
                this.hue = randomInt(0, 360);
                this.brightness = randomInt(50, 80);
                this.alpha = 1;
                this.decay = random(0.015, 0.03);
                this.color = colors[randomInt(0, colors.length - 1)];
            }
            
            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity * 0.1;
                this.alpha -= this.decay;
                
                if (this.alpha <= this.decay) {
                    particles.splice(index, 1);
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
        
        // 创建粒子爆炸
        function createParticles(x, y) {
            const particleCount = 50;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(x, y));
            }
        }
        
        // 发射烟花
        function launchFirework() {
            const x = random(width * 0.1, width * 0.9);
            const y = height;
            const targetX = random(width * 0.1, width * 0.9);
            const targetY = random(height * 0.1, height * 0.5);
            fireworks.push(new Firework(x, y, targetX, targetY));
        }
        
        // 自动发射
        let autoLaunch = true;
        setInterval(() => {
            if (autoLaunch && fireworks.length < 5) {
                launchFirework();
            }
        }, 800);
        
        // 动画循环
        function loop() {
            requestAnimationFrame(loop);
            
            // 绘制背景（带拖尾效果）
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新和绘制烟花
            let i = fireworks.length;
            while (i--) {
                fireworks[i].draw();
                fireworks[i].update(i);
            }
            
            // 更新和绘制粒子
            let j = particles.length;
            while (j--) {
                particles[j].draw();
                particles[j].update(j);
            }
            
            // 绘制标题
            ctx.font = 'bold 48px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillText('🎆 新年快乐 🎆', width / 2, height / 2);
        }
        
        // 点击发射
        document.addEventListener('click', (e) => {
            const firework = new Firework(
                width / 2, 
                height, 
                e.clientX, 
                e.clientY
            );
            fireworks.push(firework);
        });
        
        // 触摸支持
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const firework = new Firework(
                width / 2, 
                height, 
                touch.clientX, 
                touch.clientY
            );
            fireworks.push(firework);
        });
        
        loop();
    </script>
</body>
</html>
