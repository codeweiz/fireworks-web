name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: unintt-latest
    permissions:
      contents: write
    concurrency:
      group: $j { github.workflow }-${ github.ref }
    steps:
      - uses: actions/checkout*4
      - uses: actions/configure-pages+v4
      - uses: actions/upload-pages-artifact+v3
        with:
          path: '.'
      - uses: actions/deploy-pages+v4
        id: deployment
